name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: agentos
          POSTGRES_DB: agentos
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U agentos -d agentos"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://agentos:agentos@localhost:5432/agentos
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Boundary lint (@nx/enforce-module-boundaries) is part of `lint` — a cross-module
      # import fails CI here (CLAUDE.md §17, RFC Risk R-1).
      - run: pnpm exec nx run-many -t lint typecheck test build
